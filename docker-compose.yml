version: '3.8'

services:
  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - "50051:50051"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/idle_game?sslmode=disable
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=idle_game
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
